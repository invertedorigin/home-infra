apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: main
    app.kubernetes.io/instance: matter-server
    app.kubernetes.io/name: zwavematter-serverjs
  name: matter-server
  namespace: matter-server
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: main
      app.kubernetes.io/instance: matter-server
      app.kubernetes.io/name: matter-server
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: main
        app.kubernetes.io/instance: matter-server
        app.kubernetes.io/name: matter-server
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [
            {
              "name": "macvlan-conf-dhcp-sbr",
              "namespace": "kube-system",
              "mac": "1a:c1:8d:38:f3:77"
            }
          ]
    spec:
      automountServiceAccountToken: true
      initContainers:
      - name: configure-net1-ipv6
        image: busybox:1.36
        command:
        - /bin/sh
        - -ec
        - |
          for _ in $(seq 1 30); do
            ping6 -c1 -I net1 ff02::2%net1 >/dev/null 2>&1 || true
            GW="$(ip -6 neigh show dev net1 | awk '/router/ { print $1; exit }')"
            SRC="$(ip -6 -o addr show dev net1 scope global | awk '{ print $4; exit }')"
            if [ -n "$GW" ] && [ -n "$SRC" ]; then
              ip -6 rule add from "$SRC" table 100 2>/dev/null || true
              ip -6 route replace default via "$GW" dev net1 table 100
              ip -6 route replace default via "$GW" dev net1 metric 1024
              exit 0
            fi
            sleep 2
          done
          echo "failed to discover IPv6 gateway or source on net1" >&2
          exit 1
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
      containers:
      - env:
        - name: TZ
          value: America/Denver
        - name: MATTER_SERVER__INSTANCE_NAME
          value: matter-server
        - name: MATTER_SERVER__APPLICATION_URL
          value: matter-server.invertedorigin.com
        - name: MATTER_SERVER__LOG_LEVEL
          value: debug
        image: ghcr.io/home-assistant-libs/python-matter-server:8.1.0
        name: main
        resources:
          requests:
            cpu: 25m
            memory: 250Mi
        volumeMounts:
        - mountPath: /data
          name: data
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: default
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: matter-server-pvc-replicated

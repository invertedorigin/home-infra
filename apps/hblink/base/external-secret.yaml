apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hblink-secrets
spec:
  data:
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: HBLINK_MASTER_PASSPHRASE
        metadataPolicy: None
      secretKey: masterPassphrase
    - remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: HBLINK_44NET_WIREGUARD_CONFIG
        metadataPolicy: None
      secretKey: wireguardConfig
  refreshInterval: 1h0m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: hblink-secrets
    template:
      engineVersion: v2
      data:
        hblink.cfg: |-
          [GLOBAL]
          PATH: ./
          PING_TIME: 5
          MAX_MISSED: 3
          USE_ACL: True
          REG_ACL: PERMIT:ALL
          SUB_ACL: DENY:1
          TGID_TS1_ACL: PERMIT:ALL
          TGID_TS2_ACL: PERMIT:ALL

          [REPORTS]
          REPORT: True
          REPORT_INTERVAL: 60
          REPORT_PORT: 4321
          REPORT_CLIENTS: 127.0.0.1

          [LOGGER]
          LOG_FILE: /dev/null
          LOG_HANDLERS: console-timed
          LOG_LEVEL: INFO
          LOG_NAME: HBlink

          [ALIASES]
          TRY_DOWNLOAD: False
          PATH: ./
          PEER_FILE: peer_ids.json
          SUBSCRIBER_FILE: subscriber_ids.json
          TGID_FILE: talkgroup_ids.json
          PEER_URL: https://www.radioid.net/static/rptrs.json
          SUBSCRIBER_URL: https://www.radioid.net/static/users.json
          STALE_DAYS: 7

          [MASTER-1]
          MODE: MASTER
          ENABLED: True
          REPEAT: True
          MAX_PEERS: 25
          EXPORT_AMBE: False
          IP:
          PORT: 62031
          PASSPHRASE: {{ .masterPassphrase }}
          GROUP_HANGTIME: 5
          USE_ACL: True
          REG_ACL: PERMIT:ALL
          SUB_ACL: DENY:1
          TGID_TS1_ACL: PERMIT:ALL
          TGID_TS2_ACL: PERMIT:ALL
        wg0.conf: "{{ .wireguardConfig }}"

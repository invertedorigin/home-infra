apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: main
    app.kubernetes.io/instance: hblink
    app.kubernetes.io/name: hblink
  name: hblink
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: main
      app.kubernetes.io/instance: hblink
      app.kubernetes.io/name: hblink
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: main
        app.kubernetes.io/instance: hblink
        app.kubernetes.io/name: hblink
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 54000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - args:
            - |-
              sysctl -w net.ipv4.conf.all.src_valid_mark=1
              DEFAULT_GATEWAY="$(ip route show default dev eth0 | awk '{print $3; exit}')"
              if [ -z "$DEFAULT_GATEWAY" ]; then
                echo "could not determine the Cilium gateway for eth0" >&2
                exit 1
              fi
              ip route replace 10.0.1.0/24 via "$DEFAULT_GATEWAY" dev eth0
              mkdir -p /wireguard/wg_confs
              cp /secrets/wg0.conf /wireguard/wg_confs/wg0.conf
              chmod 600 /wireguard/wg_confs/wg0.conf
          command:
            - /bin/sh
            - -ec
          image: busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
          name: prepare-wireguard
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
            runAsUser: 0
          volumeMounts:
            - mountPath: /secrets
              name: wireguard-secret
              readOnly: true
            - mountPath: /wireguard
              name: wireguard-config
      containers:
        - args:
            - |-
              until ip link show wg0 >/dev/null 2>&1; do
                sleep 2
              done
              exec python /hblink3/bridge.py \
                -c /hblink3/hblink.cfg \
                -r /hblink3/rules.py
          command:
            - /bin/sh
            - -ec
          image: shaymez/hblink3:latest@sha256:616028f9c9fc89c13f62300daf46b04008f9c5915ba6a9e6a5705236207c941a
          name: hblink
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: TMPDIR
              value: /tmp
          ports:
            - containerPort: 62031
              name: dmr
              protocol: UDP
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 50m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 54000
            runAsNonRoot: true
            runAsUser: 54000
          volumeMounts:
            - mountPath: /hblink3/hblink.cfg
              name: hblink-secret
              readOnly: true
              subPath: hblink.cfg
            - mountPath: /hblink3/rules.py
              name: config
              readOnly: true
              subPath: rules.py
            - mountPath: /hblink3/aliases
              name: aliases
            - mountPath: /tmp
              name: hblink-tmp
        - args:
            - |-
              mkdir -p /tmp/parrot-aliases
              exec python /hblink3/playback.py \
                -c /hblink3/playback.cfg
          command:
            - /bin/sh
            - -ec
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: TMPDIR
              value: /tmp
          image: shaymez/hblink3:latest@sha256:616028f9c9fc89c13f62300daf46b04008f9c5915ba6a9e6a5705236207c941a
          name: parrot
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 25m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 54000
            runAsNonRoot: true
            runAsUser: 54000
          volumeMounts:
            - mountPath: /hblink3/playback.cfg
              name: hblink-secret
              readOnly: true
              subPath: playback.cfg
            - mountPath: /tmp
              name: parrot-tmp
        - env:
            - name: TZ
              value: America/Denver
          image: lscr.io/linuxserver/wireguard:1.0.20260223-r0-ls118@sha256:2868ae5e3dd9065ea3b1e44b4214b33b02b7ce5ebcb9e4f33e1132b75007f39c
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -ec
                  - |-
                    until ip link show wg0 >/dev/null 2>&1; do
                      sleep 1
                    done

                    iptables -w -N HBLINK_WG_IN 2>/dev/null || true
                    iptables -w -F HBLINK_WG_IN
                    iptables -w -A HBLINK_WG_IN -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
                    iptables -w -A HBLINK_WG_IN -p udp --dport 62031 -j ACCEPT
                    iptables -w -A HBLINK_WG_IN -p icmp -m limit --limit 10/second --limit-burst 20 -j ACCEPT
                    iptables -w -A HBLINK_WG_IN -j DROP
                    iptables -w -C INPUT -i wg0 -j HBLINK_WG_IN 2>/dev/null || \
                      iptables -w -I INPUT 1 -i wg0 -j HBLINK_WG_IN

                    ip6tables -w -N HBLINK_WG6_IN 2>/dev/null || true
                    ip6tables -w -F HBLINK_WG6_IN
                    ip6tables -w -A HBLINK_WG6_IN -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
                    ip6tables -w -A HBLINK_WG6_IN -p ipv6-icmp -m limit --limit 10/second --limit-burst 20 -j ACCEPT
                    ip6tables -w -A HBLINK_WG6_IN -j DROP
                    ip6tables -w -C INPUT -i wg0 -j HBLINK_WG6_IN 2>/dev/null || \
                      ip6tables -w -I INPUT 1 -i wg0 -j HBLINK_WG6_IN
          name: 44net-connect
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - wg show wg0 >/dev/null
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_ADMIN
              drop:
                - ALL
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - mountPath: /config
              name: wireguard-config
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            name: hblink-config
          name: config
        - name: hblink-secret
          secret:
            defaultMode: 0440
            items:
              - key: hblink.cfg
                path: hblink.cfg
              - key: playback.cfg
                path: playback.cfg
            secretName: hblink-secrets
        - name: wireguard-secret
          secret:
            defaultMode: 0400
            items:
              - key: wg0.conf
                path: wg0.conf
            secretName: hblink-secrets
        - emptyDir:
            medium: Memory
            sizeLimit: 16Mi
          name: wireguard-config
        - emptyDir:
            sizeLimit: 256Mi
          name: aliases
        - emptyDir:
            sizeLimit: 32Mi
          name: hblink-tmp
        - emptyDir:
            sizeLimit: 32Mi
          name: parrot-tmp

apiVersion: v1
kind: ConfigMap
metadata:
  name: hblink-config
data:
  rules.py: |-
    # TG 9999 on TS2 is bridged to a loopback-only playback master. The
    # playback port is not exposed by the Service or the WireGuard firewall.
    BRIDGES = {
        'PARROT': [
            {
                'SYSTEM': 'MASTER-1',
                'TS': 2,
                'TGID': 9999,
                'ACTIVE': True,
                'TIMEOUT': 0,
                'TO_TYPE': 'NONE',
                'ON': [],
                'OFF': [],
                'RESET': [],
            },
            {
                'SYSTEM': 'PARROT',
                'TS': 2,
                'TGID': 9999,
                'ACTIVE': True,
                'TIMEOUT': 0,
                'TO_TYPE': 'NONE',
                'ON': [],
                'OFF': [],
                'RESET': [],
            },
        ],
    }
    UNIT = ['MASTER-1']

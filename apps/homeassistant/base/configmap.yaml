apiVersion: v1
kind: ConfigMap
metadata:
  name: energy-meter-config
data:
  endpoints_default.yaml: |
    - Instantaneous Demand:
        url: '/upt/1/mr/1/r'
        tags:
          value:
            entity_type: sensor
            device_class: power
            unit_of_measurement: W
            state_class: measurement

    - Current Summation Delivered:
        url: '/upt/1/mr/3/rs/1/r/1'
        tags:
          value:
            entity_type: sensor
            device_class: energy
            unit_of_measurement: Wh
            state_class: total
            enabled_by_default: true

    - Max Demand Delivered:
        url: '/upt/1/mr/18/r'
        tags:
          value:
            entity_type: sensor
            device_class: power
            unit_of_measurement: W
            state_class: measurement
            enabled_by_default: true

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- namespace.yaml

namespace: mqtt

helmCharts:
- name: nats
  repo: https://nats-io.github.io/k8s/helm/charts/
  version: 2.12.6
  releaseName: nats
  namespace: mqtt
  valuesInline:
    namespaceOverride: mqtt
    config:
      cluster:
        enabled: false
      jetstream:
        enabled: true
        fileStore:
          pvc:
            storageClassName: ceph-rbd
            size: 10Gi
      mqtt:
        enabled: true
      websocket:
        enabled: true
        port: 8080
        tls:
          enabled: false
        ingress:
          enabled: true
          hosts:
          - nats-ws.invertedorigin.com
          path: /
          pathType: Prefix
          className: cilium
          tlsSecretName: nats-ws-tls-domain
          merge:
            metadata:
              annotations:
                cert-manager.io/cluster-issuer: cloudflare-issuer
    service:
      ports:
        websocket:
          enabled: true
    promExporter:
      enabled: false
    podTemplate:
      merge:
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                  - key: "app.kubernetes.io/component"
                    operator: In
                    values:
                    - nats
                topologyKey: "kubernetes.io/hostname"
    natsBox:
      enabled: true

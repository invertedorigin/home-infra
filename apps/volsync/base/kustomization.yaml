apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

helmCharts:
- name: volsync
  repo: https://backube.github.io/helm-charts/
  version: 0.15.0
  releaseName: volsync
  namespace: kube-system
  valuesInline:
    metrics:
      disableAuth: true

patches:
  - target:
      kind: (ConfigMap|ServiceAccount|Deployment|Service|Role|RoleBinding)
    patch: |-
      - op: add
        path: /metadata/namespace
        value: kube-system